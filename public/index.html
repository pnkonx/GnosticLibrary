<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nag Hammadi — Gnostic Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fira+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #15102a;
      --bg-2: #0f1430;
      --fg: #ece6d2;
      --muted: #a89f87;
      --border: rgba(201, 168, 76, 0.22);
      --border-soft: rgba(255, 255, 255, 0.06);
      --gold: #c9a84c;
      --gold-soft: #f0d78c;
      --umber: #a05a2c;
      --umber-soft: #c97a44;
      --accent: var(--gold);
      --accent-fg: #1a1330;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: "Fira Sans", system-ui, sans-serif;
      color: var(--fg);
      background-color: var(--bg-2);
      background-image:
        radial-gradient(ellipse at top left, rgba(90, 50, 160, 0.45), transparent 55%),
        radial-gradient(ellipse at bottom right, rgba(40, 60, 170, 0.40), transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      background-attachment: fixed;
    }

    h1, h2, h3 {
      font-family: "DM Serif Display", Georgia, serif;
      font-weight: 400;
      margin: 0;
    }

    /* ---------------- Sidebar ---------------- */
    #sidebar {
      width: 320px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 28px 14px;
      background: linear-gradient(180deg, rgba(35, 22, 70, 0.85), rgba(15, 20, 55, 0.85));
      backdrop-filter: blur(6px);
    }
    #sidebar h1 {
      font-size: 24px;
      margin: 0 12px 4px;
      color: var(--fg);
    }
    #sidebar .subtitle {
      font-size: 11px;
      color: var(--gold);
      opacity: 0.85;
      margin: 0 12px 22px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }
    #sidebar .subtitle::after {
      content: "";
      display: block;
      margin-top: 14px;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .codex-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      padding: 16px 12px 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .codex-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    .item {
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      margin: 1px 0;
      color: rgba(236, 230, 210, 0.78);
      border-left: 2px solid transparent;
      transition: all 0.2s ease;
    }
    .item:hover {
      background: rgba(160, 90, 44, 0.10);
      color: var(--fg);
      border-left-color: rgba(201, 168, 76, 0.5);
    }
    .item.active {
      background: rgba(201, 168, 76, 0.10);
      color: var(--gold-soft);
      border-left-color: var(--gold);
    }

    /* ---------------- Reader ---------------- */
    #reader {
      flex: 1;
      overflow-y: auto;
      padding: 64px 56px;
    }
    #reader .placeholder {
      color: var(--muted);
      text-align: center;
      margin-top: 40vh;
      font-size: 15px;
      font-family: "DM Serif Display", serif;
      font-style: italic;
    }
    #reader h2 {
      font-size: 42px;
      line-height: 1.1;
      margin: 12px 0 0;
      color: var(--fg);
    }
    #reader h2::after {
      content: "";
      display: block;
      margin-top: 20px;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    #reader .meta {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 4px;
    }
    #reader .translators {
      margin: 24px 0 36px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    #reader .translators button {
      font: inherit;
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s ease;
    }
    #reader .translators button:hover {
      color: var(--gold-soft);
      border-color: rgba(201, 168, 76, 0.6);
    }
    #reader .translators button.active {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
      box-shadow: 0 0 22px -6px rgba(201, 168, 76, 0.6);
    }
    #reader .content {
      white-space: pre-wrap;
      line-height: 1.85;
      font-size: 16px;
      max-width: 720px;
      color: rgba(236, 230, 210, 0.88);
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201, 168, 76, 0.18); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201, 168, 76, 0.32); }
  </style>
</head>
<body>
  <aside id="sidebar">
    <h1>Nag Hammadi</h1>
    <p class="subtitle">Gnostic Library</p>
    <div id="list">Loading…</div>
  </aside>
  <main id="reader">
    <p class="placeholder">Select a text to begin reading.</p>
  </main>
  <script>
    const API = "http://localhost:3000";
    let currentTranslator = null;

    async function loadTexts() {
      const res = await fetch(API + "/texts");
      const texts = await res.json();
      const groups = {};
      texts.forEach(t => { (groups[t.codex] = groups[t.codex] || []).push(t); });
      const list = document.getElementById("list");
      list.innerHTML = "";
      Object.keys(groups).forEach(codex => {
        const label = document.createElement("div");
        label.className = "codex-label";
        label.textContent = "Codex " + codex;
        list.appendChild(label);
        groups[codex].sort((a, b) => a.position - b.position).forEach(t => {
          const div = document.createElement("div");
          div.className = "item";
          div.textContent = t.title;
          div.onclick = () => {
            currentTranslator = null;
            document.querySelectorAll(".item").forEach(el => el.classList.remove("active"));
            div.classList.add("active");
            loadText(t);
          };
          list.appendChild(div);
        });
      });
    }

    async function loadText(t) {
      const reader = document.getElementById("reader");
      reader.innerHTML = '<p class="placeholder">Unsealing the text…</p>';
      const url = API + "/texts/" + t.id + "/read" + (currentTranslator ? "?translator=" + encodeURIComponent(currentTranslator) : "");
      const r = await fetch(url);
      const data = await r.json();
      const translators = t.translators || [];
      const active = currentTranslator || translators[0];
      reader.innerHTML =
        '<p class="meta">Codex ' + t.codex + ' &middot; Text ' + t.position + '</p>' +
        '<h2>' + t.title + '</h2>' +
        '<div class="translators">' +
          translators.map(tr => '<button data-tr="' + tr + '" class="' + (tr === active ? 'active' : '') + '">' + tr + '</button>').join("") +
        '</div>' +
        '<div class="content"></div>';
      reader.querySelector(".content").textContent = data.content || data.error || "";
      reader.querySelectorAll(".translators button").forEach(btn => {
        btn.onclick = () => { currentTranslator = btn.dataset.tr; loadText(t); };
      });
    }

    loadTexts();
  </script>
</body>
</html>
